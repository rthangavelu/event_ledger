services:
  account-service:
    build:
      context: .
      dockerfile: account_service/Dockerfile
    environment:
      ACCOUNT_DB_PATH: ":memory:"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      GATEWAY_DB_PATH: ":memory:"
      ACCOUNT_SERVICE_URL: "http://account-service:8001"
      # Resiliency tuning (timeouts, retries, circuit breaker).
      ACCOUNT_TIMEOUT_SECONDS: "2.0"
      ACCOUNT_MAX_RETRIES: "2"
      ACCOUNT_BACKOFF_BASE: "0.1"
      CB_FAILURE_THRESHOLD: "5"
      CB_RECOVERY_TIMEOUT: "10.0"
    ports:
      - "8000:8000"
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
